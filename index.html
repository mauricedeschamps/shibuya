<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111111">
  <title>Shibuya Go - 渋谷・原宿観光ガイド</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #1e1e1e;
      --bg-card: #2c2c2c;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --accent: #e67e22;
      --border: #3a3a3a;
      --button-bg: #333;
      --button-hover: #e67e22;
    }
    body.light {
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #212529;
      --text-secondary: #6c757d;
      --accent: #e67e22;
      --border: #dee2e6;
      --button-bg: #e9ecef;
      --button-hover: #e67e22;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem;
    }
    .app-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
      background-color: var(--bg-secondary);
    }
    .header-content {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e67e22, #f39c12);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo p {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    button, .lang-select {
      background: var(--button-bg);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-primary);
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    button:hover, .lang-select:hover {
      background: var(--button-hover);
      color: white;
      border-color: var(--button-hover);
    }
    select {
      background: var(--button-bg);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      color: var(--text-primary);
    }
    .carousel-section {
      margin: 2rem 0;
    }
    .carousel-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .carousel-header h2 {
      font-size: 1.8rem;
    }
    .slide-indicator {
      display: flex;
      gap: 0.5rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      transition: 0.2s;
      cursor: pointer;
    }
    .dot.active {
      background: var(--accent);
      width: 24px;
      border-radius: 4px;
    }
    .swipe-container {
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      cursor: grab;
      border-radius: 24px;
    }
    .swipe-container:active {
      cursor: grabbing;
    }
    .slides {
      display: flex;
      width: 100%;
    }
    .slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      padding: 0 0.25rem;
    }
    .spots-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1.5rem;
      align-items: start;
    }
    .spot-card {
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: auto;
    }
    .spot-card:not(.dummy-card):hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
    }
    .dummy-card {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      cursor: default;
      border-color: transparent;
      background: transparent;
    }
    .spot-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg-secondary);
    }
    .spot-info {
      padding: 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .spot-info h3 {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .spot-info p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      line-height: 1.4;
    }
    @media (max-width: 1100px) {
      .spots-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 700px) {
      .spots-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .access-info {
      background: var(--bg-secondary);
      border-radius: 24px;
      padding: 1.5rem;
      margin: 2rem 0;
      border: 1px solid var(--border);
    }
    .rail-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 1rem;
    }
    .rail-badge {
      background: var(--bg-primary);
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 500;
      border: 1px solid var(--border);
    }
    .map-container {
      margin: 2rem 0;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      height: 360px;
      background: #2c2c2c;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .sponsor {
      background: var(--bg-secondary);
      border-radius: 24px;
      padding: 1rem;
      margin: 1.5rem 0;
      text-align: center;
      border: 1px solid var(--border);
    }
    .sponsor-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      text-decoration: none;
      color: var(--text-primary);
      transition: opacity 0.2s;
    }
    .sponsor-link img {
      max-height: 80px;
      width: auto;
      border-radius: 16px;
      object-fit: contain;
    }
    .sponsor-link:hover {
      opacity: 0.85;
    }
    .sponsor-note {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 0.6rem;
    }
    .detail-view {
      background: var(--bg-primary);
      min-height: 60vh;
      padding: 1rem;
    }
    .detail-card {
      background: var(--bg-card);
      border-radius: 28px;
      overflow: hidden;
      max-width: 900px;
      margin: 0 auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .detail-card img {
      width: 100%;
      max-height: 450px;
      object-fit: cover;
    }
    .detail-content {
      padding: 1.8rem;
    }
    .detail-content h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .detail-desc {
      margin: 1rem 0;
      line-height: 1.6;
      white-space: pre-line;
    }
    .official-link {
      display: inline-block;
      margin-top: 1rem;
      background: var(--accent);
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 500;
    }
    .back-btn {
      background: var(--button-bg);
      border: none;
      margin-bottom: 1rem;
    }
    footer {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 2rem 1rem;
      text-align: center;
      margin-top: 3rem;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .hidden {
      display: none;
    }
    .swipe-container::-webkit-scrollbar {
      height: 5px;
    }
    .swipe-container::-webkit-scrollbar-track {
      background: var(--border);
      border-radius: 4px;
    }
    .swipe-container::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 4px;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="main-page">
    <div class="app-header">
      <div class="container header-content">
        <div class="logo">
          <h1>SHIBUYA GO</h1>
          <p>Shibuya & Harajuku • Tokyo</p>
        </div>
        <div class="controls">
          <select id="langSwitcher" class="lang-select">
            <option value="en">🇬🇧 English</option>
            <option value="it">🇮🇹 Italiano</option>
            <option value="ru">🇷🇺 Русский</option>
            <option value="ja">🇯🇵 日本語</option>
          </select>
          <button id="themeToggle">🌓 <span data-i18n="theme_btn">Dark/Light</span></button>
        </div>
      </div>
    </div>

    <div class="container">
      <!-- 上部スポンサー -->
      <div class="sponsor" id="sponsorTopArea">
        <div id="sponsorTopContainer"></div>
        <div class="sponsor-note">※ 画像・URLは sponsorConfig.js を編集</div>
      </div>

      <!-- スワイプカルーセル (3スライド: 渋谷①, 渋谷②, 原宿)  無限ループなし・端で停止 -->
      <div class="carousel-section">
        <div class="carousel-header">
          <h2 data-i18n="spots_title">✨ Hot Spots in Shibuya & Harajuku</h2>
          <div class="slide-indicator" id="slideDots"></div>
        </div>
        <div class="swipe-container" id="swipeContainer">
          <div class="slides" id="slidesContainer"></div>
        </div>
      </div>

      <!-- アクセス情報 -->
      <div class="access-info">
        <h2><i class="fas fa-train"></i> <span data-i18n="access_title">Shibuya Station Access</span></h2>
        <p data-i18n="access_desc">JR・地下鉄・私鉄の各路線と駅番号</p>
        <div class="rail-list" id="railLines"></div>
      </div>

      <!-- 地図 -->
      <div class="map-container">
        <iframe 
          title="Shibuya Station Map"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.openstreetmap.org/export/embed.html?bbox=139.6904,35.6495,139.7104,35.6695&layer=mapnik&marker=35.6595,139.7004">
        </iframe>
      </div>

      <!-- 下部スポンサー -->
      <div class="sponsor" id="sponsorBottomArea">
        <div id="sponsorBottomContainer"></div>
        <div class="sponsor-note">※ 画像・URLは sponsorConfig.js を編集</div>
      </div>
    </div>

    <footer>
      <p><span data-i18n="contact">Contact us</span><br><a href="mailto:mementomorikatsu@gmail.com">mementomorikatsu@gmail.com</a></p>
      <p style="font-size:0.7rem;">© Shibuya Go - PWA Tourist Guide</p>
    </footer>
  </div>

  <div id="detail-page" class="hidden">
    <div class="container detail-view">
      <button id="backButton" class="back-btn"><i class="fas fa-arrow-left"></i> <span data-i18n="back">Back</span></button>
      <div id="detailContent"></div>
    </div>
  </div>
</div>

    { id:11, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRPDdQDRaohyfXysmvNgDEiFdHYDBPG3YokgZKCyaLElA_qyws8Z-gn41Ts&s=10", en:{ name:"WOMB / ATOM TOKYO", short:"Legendary techno clubs. World-class sound system, international DJs." }, it:{ name:"WOMB / ATOM TOKYO", short:"Club techno leggendari. Sistema audio di livello mondiale, DJ internazionali." }, ru:{ name:"WOMB / ATOM TOKYO", short:"Легендарные техно-клубы. Аудиосистема мирового класса, международные диджеи." }, ja:{ name:"WOMB / ATOM TOKYO", short:"伝説のテクノクラブ。世界級サウンド、インターナショナルDJ。" }, url:"https://www.womb.co.jp/" }
  ];

  // 原宿エリア 〜かわいい女の子に大人気の6スポット〜
  const harajukuSpots = [
    { id:12, img:"https://picsum.photos/id/6/400/300", en:{ name:"Takeshita Street", short:"Epicenter of Harajuku's kawaii culture. Colorful crepes, pop idols, quirky fashion." }, it:{ name:"Takeshita Street", short:"Epicentro della cultura kawaii di Harajuku. Crepes colorate, idol pop, moda stravagante." }, ru:{ name:"Улица Такэсита", short:"Эпицентр культуры каваи в Харадзюку. Яркие крепы, поп-идолы, причудливая мода." }, ja:{ name:"竹下通り", short:"原宿「カワイイ」文化の発信地。カラフルなクレープ、ポップアイドル、個性的ファッション。" }, url:"https://www.takeshita-street.com/" },
    { id:13, img:"https://picsum.photos/id/29/400/300", en:{ name:"Laforet Harajuku", short:"Trendsetting fashion department store. Iconic 'Laforet Grand Bazaar' events." }, it:{ name:"Laforet Harajuku", short:"Grande magazzino di moda all'avanguardia. Iconici eventi 'Laforet Grand Bazaar'." }, ru:{ name:"Laforet Харадзюку", short:"Модный универмаг, задающий тренды. Легендарные распродажи 'Laforet Grand Bazaar'." }, ja:{ name:"ラフォーレ原宿", short:"トレンド発信のファッションビル。『ラフォーレグランバザール』が有名。" }, url:"https://www.laforet.ne.jp/" },
    { id:14, img:"https://picsum.photos/id/30/400/300", en:{ name:"Tokyu Plaza Harajuku", short:"Mirror entrance, rooftop garden 'Omohara no Mori'. Kawaii culture & modern shops." }, it:{ name:"Tokyu Plaza Harajuku", short:"Ingresso a specchi, giardino pensile 'Omohara no Mori'. Cultura kawaii e negozi moderni." }, ru:{ name:"Tokyu Plaza Харадзюку", short:"Зеркальный вход, сад на крыше 'Омохара-но-мори'. Культура каваи." }, ja:{ name:"東急プラザ原宿", short:"鏡の入り口、屋上庭園『おもはらの森』。カワイイ文化とモダンショップ。" }, url:"https://omohara.tokyu-plaza.com/" },
    { id:15, img:"https://picsum.photos/id/18/400/300", en:{ name:"KIDDY LAND", short:"Paradise for characters: Sanrio, Snoopy, Marvel, and more. 5 floors of kawaii goods." }, it:{ name:"KIDDY LAND", short:"Paradiso dei personaggi: Sanrio, Snoopy, Marvel e altro. 5 piani di articoli kawaii." }, ru:{ name:"KIDDY LAND", short:"Рай для персонажей: Sanrio, Snoopy, Marvel и другие. 5 этажей кавайных товаров." }, ja:{ name:"キデイランド", short:"サンリオ、スヌーピー、マーベルなど人気キャラグッズ専門店。5フロア。" }, url:"https://www.kiddyland.co.jp/" },
    { id:16, img:"https://picsum.photos/id/21/400/300", en:{ name:"Omotesando Hills", short:"Elegant shopping complex with luxury brands, designed by Tadao Ando." }, it:{ name:"Omotesando Hills", short:"Complesso commerciale elegante con marchi di lusso, progettato da Tadao Ando." }, ru:{ name:"Омотэсандо Хиллз", short:"Элегантный торговый комплекс с люксовыми брендами, спроектированный Тадао Андо." }, ja:{ name:"表参道ヒルズ", short:"安藤忠雄設計のラグジュアリー＆カルチャー複合施設。洗練された空間。" }, url:"https://www.omotesandohills.com/" },
    { id:17, img:"https://picsum.photos/id/47/400/300", en:{ name:"Yoyogi Park", short:"Huge green space for picnics, festivals, and people-watching. Meiji Shrine adjacent." }, it:{ name:"Yoyogi Park", short:"Grande area verde per picnic, festival e osservazione della gente. Adiacente al Santuario Meiji." }, ru:{ name:"Парк Йойоги", short:"Огромная зеленая зона для пикников, фестивалей. Рядом святилище Мэйдзи." }, ja:{ name:"代々木公園", short:"ピクニックやイベントで賑わう都内最大級の公園。明治神宮に隣接。" }, url:"https://www.tokyo-park.or.jp/park/yoyogi/" }
  ];

  // 統合: 渋谷12 + 原宿6 = 計18スポット → 3スライド (1スライド=6カード)
  const spotsData = [...shibuyaSpots, ...harajukuSpots];

  let currentLang = "en";
  let currentDetailId = null;
  const mainPage = document.getElementById("main-page");
  const detailPage = document.getElementById("detail-page");
  const slidesContainer = document.getElementById("slidesContainer");
  const dotsContainer = document.getElementById("slideDots");
  const swipeContainer = document.getElementById("swipeContainer");
  const backBtn = document.getElementById("backButton");
  const langSwitcher = document.getElementById("langSwitcher");
  const themeToggle = document.getElementById("themeToggle");
  const railLinesDiv = document.getElementById("railLines");

  const totalSlides = 3;        // 18/6 = 3 (無限ループなし)

  // 高さ均等化 (全カード)
  function normalizeAllCardHeights() {
    const allCards = Array.from(document.querySelectorAll('.spot-card:not(.dummy-card)'));
    if (allCards.length === 0) return;
    allCards.forEach(card => card.style.height = 'auto');
    void document.body.offsetHeight;
    let maxHeight = 0;
    allCards.forEach(card => { const h = card.offsetHeight; if (h > maxHeight) maxHeight = h; });
    if (maxHeight === 0) return;
    document.querySelectorAll('.spot-card').forEach(card => card.style.height = `${maxHeight}px`);
  }

  function waitForImagesAndEqualize() {
    const images = document.querySelectorAll('.spot-card img');
    if (images.length === 0) { normalizeAllCardHeights(); return; }
    let loadedCount = 0;
    const total = images.length;
    const onLoad = () => { loadedCount++; if (loadedCount === total) setTimeout(normalizeAllCardHeights, 50); };
    images.forEach(img => {
      if (img.complete) onLoad();
      else { img.addEventListener('load', onLoad, { once: true }); img.addEventListener('error', onLoad, { once: true }); }
    });
    setTimeout(() => { if (loadedCount !== total) normalizeAllCardHeights(); }, 400);
  }

  function addDummyCardsToSlide(grid, currentCount) {
    const needed = 6 - currentCount;
    for (let i = 0; i < needed; i++) {
      const dummy = document.createElement('div');
      dummy.className = 'spot-card dummy-card';
      dummy.innerHTML = `<div class="spot-info" style="opacity:0; visibility:hidden;"><h3>&nbsp;</h3><p>&nbsp;</p></div>`;
      dummy.style.cursor = 'default';
      grid.appendChild(dummy);
    }
  }

  function buildSlides() {
    slidesContainer.innerHTML = "";
    const itemsPerSlide = 6;
    for (let slideIdx = 0; slideIdx < totalSlides; slideIdx++) {
      const slide = document.createElement("div");
      slide.className = "slide";
      const grid = document.createElement("div");
      grid.className = "spots-grid";
      const start = slideIdx * itemsPerSlide;
      const end = Math.min(start + itemsPerSlide, spotsData.length);
      for (let i = start; i < end; i++) {
        const spot = spotsData[i];
        const card = document.createElement("div");
        card.className = "spot-card";
        card.onclick = () => showDetail(spot.id);
        card.innerHTML = `
          <img src="${spot.img}" alt="${spot[currentLang].name}" loading="lazy">
          <div class="spot-info">
            <h3>${spot[currentLang].name}</h3>
            <p>${spot[currentLang].short}</p>
          </div>
        `;
        grid.appendChild(card);
      }
      // 足りない分ダミー追加
      if (grid.children.length < 6) addDummyCardsToSlide(grid, grid.children.length);
      slide.appendChild(grid);
      slidesContainer.appendChild(slide);
    }
    updateDots();
    waitForImagesAndEqualize();
  }

  function updateDots() {
    if (!swipeContainer) return;
    const scrollPos = swipeContainer.scrollLeft;
    const slideWidth = swipeContainer.clientWidth;
    let activeIndex = Math.round(scrollPos / slideWidth);
    if (isNaN(activeIndex) || activeIndex < 0) activeIndex = 0;
    if (activeIndex >= totalSlides) activeIndex = totalSlides - 1;
    dotsContainer.innerHTML = "";
    for (let i = 0; i < totalSlides; i++) {
      const dot = document.createElement("div");
      dot.className = "dot" + (i === activeIndex ? " active" : "");
      dot.addEventListener("click", () => {
        swipeContainer.scrollTo({ left: i * swipeContainer.clientWidth, behavior: "smooth" });
      });
      dotsContainer.appendChild(dot);
    }
  }

  // 無限ループ処理を完全に除去 (スクロールイベントでは単にドット更新のみ)
  swipeContainer.addEventListener("scroll", () => {
    clearTimeout(window._dotTimer);
    window._dotTimer = setTimeout(updateDots, 80);
  });
  
  window.addEventListener("resize", () => {
    setTimeout(() => { updateDots(); waitForImagesAndEqualize(); }, 150);
  });

  function showDetail(id) {
    currentDetailId = id;
    mainPage.classList.add("hidden");
    detailPage.classList.remove("hidden");
    renderDetailPage(id);
    history.pushState({ detail: true }, "", `#spot-${id}`);
  }

  function renderDetailPage(id) {
    const spot = spotsData.find(s => s.id === id);
    if (!spot) return;
    const name = spot[currentLang].name;
    const desc = spot[currentLang].short;
    document.getElementById("detailContent").innerHTML = `
      <div class="detail-card">
        <img src="${spot.img}" alt="${name}">
        <div class="detail-content">
          <h2>${name}</h2>
          <div class="detail-desc">${desc}</div>
          <a href="${spot.url}" target="_blank" rel="noopener" class="official-link">
            <i class="fas fa-external-link-alt"></i> ${currentLang === 'ja' ? '公式サイトへ' : 'Official Website'}
          </a>
        </div>
      </div>
    `;
  }

  function goBackToMain() {
    currentDetailId = null;
    mainPage.classList.remove("hidden");
    detailPage.classList.add("hidden");
    history.pushState({ main: true }, "", "/");
  }
  backBtn.onclick = goBackToMain;
  window.addEventListener("popstate", () => { if (!mainPage.classList.contains("hidden")) return; goBackToMain(); });

  function renderSponsors() {
    if (typeof sponsorConfig === 'undefined') return;
    const topContainer = document.getElementById("sponsorTopContainer");
    const bottomContainer = document.getElementById("sponsorBottomContainer");
    const createLink = (cfg) => {
      if (cfg && cfg.imageUrl && cfg.linkUrl) return `<a href="${cfg.linkUrl}" target="_blank" class="sponsor-link"><img src="${cfg.imageUrl}" alt="${cfg.altText || 'sponsor'}"></a>`;
      return `<span class="sponsor-link" style="cursor:default;"><i class="fas fa-ad"></i> ${cfg?.defaultText || 'Advertisement'}</span>`;
    };
    if (topContainer) topContainer.innerHTML = createLink(sponsorConfig.top);
    if (bottomContainer) bottomContainer.innerHTML = createLink(sponsorConfig.bottom);
  }

  function updateLanguage() {
    const t = translations[currentLang];
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");
      if (t[key]) el.innerText = t[key];
    });
    railLinesDiv.innerHTML = "";
    t.rail_lines.forEach(line => { const badge = document.createElement("span"); badge.className = "rail-badge"; badge.innerText = line; railLinesDiv.appendChild(badge); });
    buildSlides(); // 完全再構築
    if (currentDetailId !== null) renderDetailPage(currentDetailId);
    renderSponsors();
  }

  function initTheme() {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
    else if (localStorage.getItem('theme') === 'dark') document.body.classList.remove('light');
    else if (!prefersDark) document.body.classList.add('light');
  }
  themeToggle.addEventListener("click", () => {
    document.body.classList.toggle("light");
    localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
  });
  initTheme();
  langSwitcher.addEventListener("change", (e) => { currentLang = e.target.value; updateLanguage(); });

  buildSlides();
  renderSponsors();
  updateLanguage();
  window.addEventListener('load', () => { waitForImagesAndEqualize(); setTimeout(() => swipeContainer.scrollLeft = 0, 10); });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => console.log('SW registered', reg)).catch(err => console.log('SW error', err));
    });
  }
</script>
</body>
</html>
