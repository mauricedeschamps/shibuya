<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111111">
  <title>Shibuya Go - 渋谷観光ガイド</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #1e1e1e;
      --bg-card: #2c2c2c;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --accent: #e67e22;
      --border: #3a3a3a;
      --button-bg: #333;
      --button-hover: #e67e22;
    }
    body.light {
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #212529;
      --text-secondary: #6c757d;
      --accent: #e67e22;
      --border: #dee2e6;
      --button-bg: #e9ecef;
      --button-hover: #e67e22;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem;
    }
    .app-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
      background-color: var(--bg-secondary);
    }
    .header-content {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e67e22, #f39c12);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo p {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    button, .lang-select {
      background: var(--button-bg);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-primary);
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    button:hover, .lang-select:hover {
      background: var(--button-hover);
      color: white;
      border-color: var(--button-hover);
    }
    select {
      background: var(--button-bg);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      color: var(--text-primary);
    }
    .carousel-section {
      margin: 2rem 0;
    }
    .carousel-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .carousel-header h2 {
      font-size: 1.8rem;
    }
    .slide-indicator {
      display: flex;
      gap: 0.5rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      transition: 0.2s;
    }
    .dot.active {
      background: var(--accent);
      width: 24px;
      border-radius: 4px;
    }
    .swipe-container {
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      cursor: grab;
      border-radius: 24px;
    }
    .swipe-container:active {
      cursor: grabbing;
    }
    .slides {
      display: flex;
      width: 100%;
    }
    .slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      padding: 0 0.25rem;
    }
    .spots-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1.5rem;
      align-items: start;
    }
    /* カードのスタイル - 高さはJSで均等化＋ダミーで行数を統一 */
    .spot-card {
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: auto;
    }
    .spot-card:not(.dummy-card):hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
    }
    .dummy-card {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      cursor: default;
      border-color: transparent;
      background: transparent;
    }
    .spot-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg-secondary);
    }
    .spot-info {
      padding: 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .spot-info h3 {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .spot-info p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      line-height: 1.4;
    }
    @media (max-width: 1100px) {
      .spots-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 700px) {
      .spots-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .access-info {
      background: var(--bg-secondary);
      border-radius: 24px;
      padding: 1.5rem;
      margin: 2rem 0;
      border: 1px solid var(--border);
    }
    .rail-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 1rem;
    }
    .rail-badge {
      background: var(--bg-primary);
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 500;
      border: 1px solid var(--border);
    }
    .map-container {
      margin: 2rem 0;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      height: 360px;
      background: #2c2c2c;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .sponsor {
      background: var(--bg-secondary);
      border-radius: 24px;
      padding: 1rem;
      margin: 1.5rem 0;
      text-align: center;
      border: 1px solid var(--border);
    }
    .sponsor-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      text-decoration: none;
      color: var(--text-primary);
      transition: opacity 0.2s;
    }
    .sponsor-link img {
      max-height: 80px;
      width: auto;
      border-radius: 16px;
      object-fit: contain;
    }
    .sponsor-link:hover {
      opacity: 0.85;
    }
    .sponsor-note {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 0.6rem;
    }
    .detail-view {
      background: var(--bg-primary);
      min-height: 60vh;
      padding: 1rem;
    }
    .detail-card {
      background: var(--bg-card);
      border-radius: 28px;
      overflow: hidden;
      max-width: 900px;
      margin: 0 auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .detail-card img {
      width: 100%;
      max-height: 450px;
      object-fit: cover;
    }
    .detail-content {
      padding: 1.8rem;
    }
    .detail-content h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .detail-desc {
      margin: 1rem 0;
      line-height: 1.6;
      white-space: pre-line;
    }
    .official-link {
      display: inline-block;
      margin-top: 1rem;
      background: var(--accent);
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 500;
    }
    .back-btn {
      background: var(--button-bg);
      border: none;
      margin-bottom: 1rem;
    }
    footer {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 2rem 1rem;
      text-align: center;
      margin-top: 3rem;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .hidden {
      display: none;
    }
    .swipe-container::-webkit-scrollbar {
      height: 5px;
    }
    .swipe-container::-webkit-scrollbar-track {
      background: var(--border);
      border-radius: 4px;
    }
    .swipe-container::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 4px;
    }
  </style>
</head>

        </iframe>
      </div>

      <!-- 下部スポンサー -->
      <div class="sponsor" id="sponsorBottomArea">
        <div id="sponsorBottomContainer"></div>
        <div class="sponsor-note">※ 画像・URLは sponsorConfig.js を編集</div>
      </div>
    </div>

    <footer>
      <p><span data-i18n="contact">Contact us</span><br><a href="mailto:mementomorikatsu@gmail.com">mementomorikatsu@gmail.com</a></p>
      <p style="font-size:0.7rem;">© Shibuya Go - PWA Tourist Guide</p>
    </footer>
  </div>

  <div id="detail-page" class="hidden">
    <div class="container detail-view">
      <button id="backButton" class="back-btn"><i class="fas fa-arrow-left"></i> <span data-i18n="back">Back</span></button>
      <div id="detailContent"></div>
    </div>
  </div>
</div>

  const swipeContainer = document.getElementById("swipeContainer");
  const backBtn = document.getElementById("backButton");
  const langSwitcher = document.getElementById("langSwitcher");
  const themeToggle = document.getElementById("themeToggle");
  const railLinesDiv = document.getElementById("railLines");

  let totalSlides = Math.ceil(spotsData.length / 6);

  // ========== すべてのカードの高さを完全に揃える (全スライド共通の最大高さ) ==========
  function normalizeAllCardHeights() {
    // 全実カード（ダミー除外）を取得
    const allCards = Array.from(document.querySelectorAll('.spot-card:not(.dummy-card)'));
    if (allCards.length === 0) return;

    // いったん高さリセット (auto)
    allCards.forEach(card => {
      card.style.height = 'auto';
    });
    // 強制的にリフロー
    void document.body.offsetHeight;

    // 最大高さを計算
    let maxHeight = 0;
    allCards.forEach(card => {
      const h = card.offsetHeight;
      if (h > maxHeight) maxHeight = h;
    });
    if (maxHeight === 0) return;

    // 全カード（ダミーも含む）に同じ高さを設定 → 全てのスライドの高さが完璧に統一される
    const allCardsInclDummy = document.querySelectorAll('.spot-card');
    allCardsInclDummy.forEach(card => {
      card.style.height = `${maxHeight}px`;
    });
  }

  // 画像完全ロード後に再調整 (より堅牢)
  function waitForImagesAndEqualize() {
    const images = document.querySelectorAll('.spot-card img');
    if (images.length === 0) {
      normalizeAllCardHeights();
      return;
    }
    let loadedCount = 0;
    const totalImages = images.length;
    const onImageLoad = () => {
      loadedCount++;
      if (loadedCount === totalImages) {
        setTimeout(() => normalizeAllCardHeights(), 50);
      }
    };
    images.forEach(img => {
      if (img.complete) {
        onImageLoad();
      } else {
        img.addEventListener('load', onImageLoad, { once: true });
        img.addEventListener('error', onImageLoad, { once: true });
      }
    });
    // タイムアウトでも実行 (保険)
    setTimeout(() => {
      if (loadedCount !== totalImages) normalizeAllCardHeights();
    }, 300);
  }

  // ダミーカードを追加し、各スライドのカード数を6枚に統一 (行数を完全一致させる)
  function addDummyCardsToSlides() {
    const slides = document.querySelectorAll('.slide');
    slides.forEach(slide => {
      const grid = slide.querySelector('.spots-grid');
      if (!grid) return;
      let cards = grid.querySelectorAll('.spot-card');
      const currentCount = cards.length;
      if (currentCount < 6) {
        const needed = 6 - currentCount;
        for (let i = 0; i < needed; i++) {
          const dummyCard = document.createElement('div');
          dummyCard.className = 'spot-card dummy-card';
          // 非表示でも構造は維持し、高さ調整に参加させるため中に空のinfoを入れる
          dummyCard.innerHTML = `
            <div class="spot-info" style="opacity:0; visibility:hidden;">
              <h3 style="min-height: 24px;">&nbsp;</h3>
              <p>&nbsp;</p>
            </div>
          `;
          dummyCard.style.cursor = 'default';
          grid.appendChild(dummyCard);
        }
      }
    });
    // ダミー追加後すぐに高さ調整を呼ぶ準備
  }

  // スライド構築 (カード枚数6の倍数になるようにし、ダミー追加)
  function buildSlides() {
    slidesContainer.innerHTML = "";
    const totalItems = spotsData.length;
    const cardsPerSlide = 6;
    const slideCount = Math.ceil(totalItems / cardsPerSlide);
    
    for (let i = 0; i < slideCount; i++) {
      const slide = document.createElement("div");
      slide.className = "slide";
      const grid = document.createElement("div");
      grid.className = "spots-grid";
      const start = i * cardsPerSlide;
      const end = Math.min(start + cardsPerSlide, totalItems);
      for (let j = start; j < end; j++) {
        const spot = spotsData[j];
        const card = document.createElement("div");
        card.className = "spot-card";
        card.onclick = () => showDetail(spot.id);
        card.innerHTML = `
          <img src="${spot.img}" alt="${spot[currentLang].name}" loading="lazy">
          <div class="spot-info">
            <h3>${spot[currentLang].name}</h3>
            <p>${spot[currentLang].short}</p>
          </div>
        `;
        grid.appendChild(card);
      }
      slide.appendChild(grid);
      slidesContainer.appendChild(slide);
    }
    // すべてのスライドにダミーを追加してカード数を6に統一
    addDummyCardsToSlides();
    updateDots();
    // 高さ調整（画像ロード後）
    waitForImagesAndEqualize();
  }

  function updateDots() {
    const activeIndex = Math.round(swipeContainer.scrollLeft / swipeContainer.clientWidth);
    dotsContainer.innerHTML = "";
    const total = document.querySelectorAll('.slide').length;
    for (let i = 0; i < total; i++) {
      const dot = document.createElement("div");
      dot.className = "dot" + (i === activeIndex ? " active" : "");
      dotsContainer.appendChild(dot);
    }
  }

  swipeContainer.addEventListener("scroll", () => {
    clearTimeout(window._dotTimer);
    window._dotTimer = setTimeout(updateDots, 100);
  });
  
  window.addEventListener("resize", () => {
    setTimeout(() => {
      updateDots();
      // リサイズ時も高さ再調整（レイアウト変化対応）
      waitForImagesAndEqualize();
    }, 150);
  });

  // 詳細表示
  function showDetail(id) {
    currentDetailId = id;
    mainPage.classList.add("hidden");
    detailPage.classList.remove("hidden");
    renderDetailPage(id);
    history.pushState({ detail: true }, "", `#spot-${id}`);
  }

  function renderDetailPage(id) {
    const spot = spotsData.find(s => s.id === id);
    if (!spot) return;
    const detailText = spot[currentLang].short; // 詳細はショートで代用（要望に応じて拡張可）
    const name = spot[currentLang].name;
    document.getElementById("detailContent").innerHTML = `
      <div class="detail-card">
        <img src="${spot.img}" alt="${name}">
        <div class="detail-content">
          <h2>${name}</h2>
          <div class="detail-desc">${detailText}</div>
          <a href="${spot.url}" target="_blank" rel="noopener" class="official-link">
            <i class="fas fa-external-link-alt"></i> ${currentLang === 'ja' ? '公式サイトへ' : 'Official Website'}
          </a>
        </div>
      </div>
    `;
  }

  function goBackToMain() {
    currentDetailId = null;
    mainPage.classList.remove("hidden");
    detailPage.classList.add("hidden");
    history.pushState({ main: true }, "", "/");
  }
  backBtn.onclick = goBackToMain;
  window.addEventListener("popstate", () => { if (!mainPage.classList.contains("hidden")) return; goBackToMain(); });

  // スポンサー表示
  function renderSponsors() {
    if (typeof sponsorConfig === 'undefined') return;
    const topContainer = document.getElementById("sponsorTopContainer");
    const bottomContainer = document.getElementById("sponsorBottomContainer");
    function createLink(config) {
      if (config && config.imageUrl && config.linkUrl) {
        return `<a href="${config.linkUrl}" target="_blank" class="sponsor-link"><img src="${config.imageUrl}" alt="${config.altText || 'sponsor'}"></a>`;
      }
      return `<span class="sponsor-link" style="cursor:default;"><i class="fas fa-ad"></i> ${config?.defaultText || 'Advertisement'}</span>`;
    }
    if (topContainer) topContainer.innerHTML = createLink(sponsorConfig.top);
    if (bottomContainer) bottomContainer.innerHTML = createLink(sponsorConfig.bottom);
  }

  // 言語更新
  function updateLanguage() {
    const t = translations[currentLang];
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");
      if (t[key]) el.innerText = t[key];
    });
    railLinesDiv.innerHTML = "";
    t.rail_lines.forEach(line => {
      const badge = document.createElement("span");
      badge.className = "rail-badge";
      badge.innerText = line;
      railLinesDiv.appendChild(badge);
    });
    // 再構築してテキスト刷新
    buildSlides();
    if (currentDetailId !== null) renderDetailPage(currentDetailId);
    renderSponsors();
  }

  // テーマ初期化
  function initTheme() {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
    else if (localStorage.getItem('theme') === 'dark') document.body.classList.remove('light');
    else if (!prefersDark) document.body.classList.add('light');
  }
  themeToggle.addEventListener("click", () => {
    document.body.classList.toggle("light");
    localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
  });
  initTheme();
  
  langSwitcher.addEventListener("change", (e) => { 
    currentLang = e.target.value; 
    updateLanguage(); 
  });
  
  // 初期構築
  buildSlides();
  renderSponsors();
  updateLanguage();
  
  // 最後に安全のため load 時も高さ調整
  window.addEventListener('load', () => {
    waitForImagesAndEqualize();
  });

  // Service Worker (PWA)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => console.log('SW registered', reg)).catch(err => console.log('SW error', err));
    });
  }
</script>
</body>
</html>
