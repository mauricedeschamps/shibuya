<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111111">
  <title>Shibuya Go - 渋谷観光ガイド</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
    }
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #1e1e1e;
      --bg-card: #2c2c2c;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --accent: #e67e22;
      --border: #3a3a3a;
      --button-bg: #333;
      --button-hover: #e67e22;
    }
    body.light {
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #212529;
      --text-secondary: #6c757d;
      --accent: #e67e22;
      --border: #dee2e6;
      --button-bg: #e9ecef;
      --button-hover: #e67e22;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem;
    }
    .app-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
      width: 100%;
    }
    .header-content {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e67e22, #f39c12);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo p {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    button, .lang-select {
      background: var(--button-bg);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-primary);
      font-size: 0.85rem;
    }
    button:hover, .lang-select:hover {
      background: var(--button-hover);
      color: white;
      border-color: var(--button-hover);
    }
    select {
      background: var(--button-bg);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      color: var(--text-primary);
    }
    .carousel-section {
      margin: 2rem 0;
    }
    .carousel-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .carousel-header h2 {
      font-size: 1.8rem;
    }
    .slide-indicator {
      display: flex;
      gap: 0.5rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      transition: 0.2s;
    }
    .dot.active {
      background: var(--accent);
      width: 24px;
      border-radius: 4px;
    }
    .swipe-container {
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      cursor: grab;
    }
    .swipe-container:active {
      cursor: grabbing;
    }
    .slides {
      display: flex;
      width: 100%;
    }
    .slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      padding: 0 0.25rem;
    }
    .spots-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1.5rem;
    }
    @media (max-width: 1100px) {
      .spots-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 700px) {
      .spots-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .spot-card {
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .spot-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .spot-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .spot-info {
      padding: 1rem;
    }
    .spot-info h3 {
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
    }
    .spot-info p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .access-info {
      background: var(--bg-secondary);
      border-radius: 24px;
      padding: 1.5rem;
      margin: 2rem 0;
      border: 1px solid var(--border);
    }
    .rail-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 1rem;
    }
    .rail-badge {
      background: var(--bg-primary);
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .map-container {
      margin: 2rem 0;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      height: 360px;
      background: #2c2c2c;
    }
    .map-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      flex-direction: column;
      gap: 1rem;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .sponsor {
      background: var(--bg-secondary);
      border-radius: 24px;
      padding: 1rem;
      margin: 1.5rem 0;
      text-align: center;
      border: 1px solid var(--border);
    }
    .sponsor-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      color: white;
      text-decoration: none;
      font-weight: 600;
    }
    .sponsor-note {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
    }
    .detail-view {
      background: var(--bg-primary);
      min-height: 60vh;
      padding: 1rem;
    }
    .detail-card {
      background: var(--bg-card);
      border-radius: 28px;
      overflow: hidden;
      max-width: 900px;
      margin: 0 auto;
    }
    .detail-card img {
      width: 100%;
      max-height: 450px;
      object-fit: cover;
    }
    .detail-content {
      padding: 1.8rem;
    }
    .detail-content h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .detail-desc {
      margin: 1rem 0;
      line-height: 1.6;
      white-space: pre-line;
    }
    .official-link {
      display: inline-block;
      margin-top: 1rem;
      background: var(--accent);
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      text-decoration: none;
    }
    .back-btn {
      background: var(--button-bg);
      border: none;
      margin-bottom: 1rem;
    }
    footer {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 2rem 1rem;
      text-align: center;
      margin-top: 3rem;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .hidden {
      display: none;
    }
    .swipe-container::-webkit-scrollbar {
      height: 4px;
    }
    .swipe-container::-webkit-scrollbar-track {
      background: var(--border);
      border-radius: 4px;
    }
    .swipe-container::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 4px;
    }
  </style>
</head>

  const backBtn = document.getElementById("backButton");
  const langSwitcher = document.getElementById("langSwitcher");
  const themeToggle = document.getElementById("themeToggle");
  const railLinesDiv = document.getElementById("railLines");

  let totalSlides = Math.ceil(spotsData.length / 6);
  function buildSlides() {
    slidesContainer.innerHTML = "";
    for (let i = 0; i < totalSlides; i++) {
      const slide = document.createElement("div");
      slide.className = "slide";
      const grid = document.createElement("div");
      grid.className = "spots-grid";
      const start = i * 6;
      const end = Math.min(start + 6, spotsData.length);
      for (let j = start; j < end; j++) {
        const spot = spotsData[j];
        const card = document.createElement("div");
        card.className = "spot-card";
        card.onclick = () => showDetail(spot.id);
        card.innerHTML = `
          <img src="${spot.img}" alt="${spot[currentLang].name}" loading="lazy">
          <div class="spot-info">
            <h3>${spot[currentLang].name}</h3>
            <p>${spot[currentLang].short}</p>
          </div>
        `;
        grid.appendChild(card);
      }
      slide.appendChild(grid);
      slidesContainer.appendChild(slide);
    }
    updateDots();
  }

  function updateDots() {
    const activeIndex = Math.round(swipeContainer.scrollLeft / swipeContainer.clientWidth);
    dotsContainer.innerHTML = "";
    for (let i = 0; i < totalSlides; i++) {
      const dot = document.createElement("div");
      dot.className = "dot" + (i === activeIndex ? " active" : "");
      dotsContainer.appendChild(dot);
    }
  }
  swipeContainer.addEventListener("scroll", () => {
    clearTimeout(window.scrollEndTimer);
    window.scrollEndTimer = setTimeout(updateDots, 150);
  });
  window.addEventListener("resize", () => setTimeout(updateDots, 100));

  function showDetail(id) {
    currentDetailId = id;
    mainPage.classList.add("hidden");
    detailPage.classList.remove("hidden");
    renderDetailPage(id);
    history.pushState({ detail: true }, "", `#spot-${id}`);
  }
  function renderDetailPage(id) {
    const spot = spotsData.find(s => s.id === id);
    if (!spot) return;
    const detailText = spot[currentLang].detail;
    const name = spot[currentLang].name;
    document.getElementById("detailContent").innerHTML = `
      <div class="detail-card">
        <img src="${spot.img}" alt="${name}">
        <div class="detail-content">
          <h2>${name}</h2>
          <div class="detail-desc">${detailText}</div>
          <a href="${spot.url}" target="_blank" rel="noopener" class="official-link">
            <i class="fas fa-external-link-alt"></i> ${currentLang === 'ja' ? '公式サイトへ' : 'Official Website'}
          </a>
        </div>
      </div>
    `;
  }
  function goBackToMain() {
    currentDetailId = null;
    mainPage.classList.remove("hidden");
    detailPage.classList.add("hidden");
    history.pushState({ main: true }, "", "/");
  }
  backBtn.onclick = goBackToMain;
  window.addEventListener("popstate", () => { if (!mainPage.classList.contains("hidden")) return; goBackToMain(); });

  function updateLanguage() {
    const t = translations[currentLang];
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");
      if (t[key]) el.innerText = t[key];
    });
    railLinesDiv.innerHTML = "";
    t.rail_lines.forEach(line => {
      const badge = document.createElement("span");
      badge.className = "rail-badge";
      badge.innerText = line;
      railLinesDiv.appendChild(badge);
    });
    buildSlides();
    if (currentDetailId !== null) renderDetailPage(currentDetailId);
    const sponsorSpans = document.querySelectorAll("#sponsorTopLink span, #sponsorBottomLink span");
    sponsorSpans.forEach(span => { if (span.getAttribute("data-i18n") === "sponsor_default") span.innerText = t.sponsor_default; });
  }

  function initTheme() {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
    else if (localStorage.getItem('theme') === 'dark') document.body.classList.remove('light');
    else if (!prefersDark) document.body.classList.add('light');
  }
  themeToggle.addEventListener("click", () => {
    document.body.classList.toggle("light");
    localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
  });
  initTheme();
  langSwitcher.addEventListener("change", (e) => { currentLang = e.target.value; updateLanguage(); });
  buildSlides();
  updateLanguage();
  setTimeout(updateDots, 100);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => console.log('SW registered', reg)).catch(err => console.log('SW error', err));
    });
  }
</script>
</body>
</html>
